<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GN Tracker"/>
<title>Gáznár Norbert · Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0f14;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
button{font-family:inherit;-webkit-appearance:none;border:none;cursor:pointer}
input{font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
#app{min-height:100vh;padding-bottom:88px}

/* HEADER */
.header{background:linear-gradient(135deg,#131720,#1a1f2e);border-bottom:1px solid #ffffff0f;
  padding:14px 20px 10px;position:sticky;top:0;z-index:100}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:800;letter-spacing:-.4px}
.header p{font-size:11px;color:#ffffff44;font-family:monospace;margin-top:2px}
.week-badge{font-size:11px;background:#2ecc7115;color:#2ecc71;border:1px solid #2ecc7128;
  border-radius:8px;padding:3px 10px;font-family:monospace;white-space:nowrap}
.nav{display:flex;background:#ffffff08;border-radius:12px;padding:3px;margin-top:10px}
.nav button{flex:1;padding:7px 0;border-radius:9px;background:transparent;color:#ffffff66;
  font-weight:500;font-size:12px;transition:all .2s}
.nav button.active{background:#2ecc71;color:#0d0f14;font-weight:700}

/* DAY ROW */
.day-row{display:flex;gap:6px;overflow-x:auto;padding:12px 20px 0;scrollbar-width:none}
.day-btn{flex-shrink:0;width:44px;height:52px;border-radius:12px;background:#ffffff08;
  color:#ffffff77;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:2px solid transparent;transition:all .2s}
.day-btn .day-name{font-size:12px;font-weight:700}
.day-btn .day-dot{font-size:8px}
.day-btn .day-pct{font-size:9px;font-family:monospace}

/* CONTENT */
.content{padding:14px 20px}

/* CARD */
.card{background:#131720;border:1px solid #ffffff0f;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:#ffffff44;margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px}

/* STATS BAR */
.stats-bar{display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;font-family:monospace}
.stats-right{flex:1}
.stats-count{font-size:14px;font-weight:700;margin-bottom:5px}

/* PROGRESS BAR */
.prog-outer{height:7px;background:#ffffff12;border-radius:4px;overflow:hidden}
.prog-inner{height:100%;border-radius:4px;transition:width .5s ease}

/* BADGES */
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:11px;border-radius:6px;padding:2px 8px;font-weight:600;border:1px solid transparent}

/* EDZÉS BANNER */
.edzés-banner{border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:600}

/* FILTER ROW */
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;scrollbar-width:none}
.filter-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1px solid #ffffff15;
  background:transparent;color:#ffffff55;font-size:12px;font-weight:500;white-space:nowrap}
.filter-btn.active{font-weight:700}

/* ITEM CARD */
.item-card{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;
  border:1px solid #ffffff0a;border-radius:12px;margin-bottom:7px;cursor:pointer;
  background:#131720;user-select:none;-webkit-user-select:none;transition:all .15s}
.item-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.item-body{flex:1}
.item-label{font-size:13px;color:#f0f0f0;line-height:1.4}
.item-label.done{color:#ffffff66;text-decoration:line-through}
.item-time{font-size:11px;color:#ffffff33;font-family:monospace;margin-top:2px}
.checkbox{width:21px;height:21px;border-radius:6px;border:2px solid #ffffff22;
  background:transparent;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;transition:all .15s}

/* WEIGHT */
.weight-stats{display:flex;gap:8px;margin-bottom:14px}
.weight-stat{flex:1;text-align:center;background:#ffffff06;border-radius:10px;padding:8px 4px}
.weight-stat .val{font-size:13px;font-weight:800}
.weight-stat .lbl{font-size:10px;color:#ffffff44;margin-top:2px}
.weight-input-row{display:flex;gap:8px;margin-top:12px;align-items:center}
.weight-input{flex:1;background:#ffffff0a;border:1px solid #3a7bd544;border-radius:10px;
  color:#fff;font-size:16px;font-family:monospace;padding:10px 14px;outline:none;width:100%}
.weight-btn{padding:10px 18px;border:1px solid #3a7bd5;border-radius:10px;
  background:#3a7bd522;color:#3a7bd5;font-weight:700;font-size:13px;white-space:nowrap}
.weight-goal{font-size:12px;color:#ffffff44;margin-top:8px;text-align:center}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav-btn{background:#ffffff08;border:1px solid #ffffff15;border-radius:8px;
  color:#fff;padding:5px 14px;font-size:14px}
.month-nav-label{font-weight:700;font-size:15px}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#131720ee;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid #ffffff0f;padding:10px 20px 22px;display:flex;gap:8px}
.act-btn{flex:1;padding:11px 0;border-radius:12px;font-weight:700;font-size:12px}

/* BANNER */
.banner{background:#2ecc7115;border:1px solid #2ecc7130;border-radius:10px;
  padding:9px 13px;font-size:12px;color:#2ecc71;margin-bottom:12px}

/* SUMMARY CAT ROW */
.cat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.cat-label{font-size:12px;font-weight:600;width:88px;flex-shrink:0}
.cat-num{font-size:11px;color:#ffffff44;font-family:monospace;width:34px;text-align:right}

/* DAY WEEK ROW */
.day-week-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer}
.day-week-short{width:30px;font-size:12px;font-weight:700}
</style>
</head>

function todayStr(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return String(n).padStart(2,"0");}
function getWeekId(dt){const d=dt?new Date(dt):new Date();const s=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);return d.getFullYear()+"-W"+pad(w);}
function todayDow(){return new Date().getDay();}
function weeksInMonth(y,m){const r=[];const n=new Date(y,m+1,0).getDate();for(let i=1;i<=n;i++){const w=getWeekId(new Date(y,m,i));if(!r.includes(w))r.push(w);}return r;}
function calcStats(checked,dow){
  const day=WEEK_PLAN[dow];if(!day)return{total:0,done:0,pct:0,bycat:{}};
  const t=day.items.length,d=day.items.filter(i=>checked[i.id]).length;
  const bc={};for(const c of Object.keys(CAT_CFG)){const its=day.items.filter(i=>i.cat===c);bc[c]={total:its.length,done:its.filter(i=>checked[i.id]).length};}
  return{total:t,done:d,pct:t?Math.round(d/t*100):0,bycat:bc};
}
function calcWeekStats(checked){
  let t=0,d=0;const bc={};for(const c of Object.keys(CAT_CFG))bc[c]={total:0,done:0};
  for(const dow of Object.keys(WEEK_PLAN))for(const it of WEEK_PLAN[dow].items){t++;bc[it.cat].total++;if(checked[it.id]){d++;bc[it.cat].done++;}}
  return{total:t,done:d,pct:t?Math.round(d/t*100):0,bycat:bc};
}
function loadLS(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):{};}catch{return{};}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// SVG RING
// ═══════════════════════════════════════════════════════════════
function ringHTML(pct,size,color){
  const stroke=size>70?8:7,r=(size-stroke)/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#ffffff15" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:${Math.round(size*.21)}px;font-weight:800;color:#fff;font-family:monospace">${pct}%</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// WEIGHT CHART SVG
// ═══════════════════════════════════════════════════════════════
function weightChartHTML(entries){
  if(!entries.length)return`<div style="text-align:center;color:#ffffff33;font-size:13px;padding:18px 0">Még nincs súlyadat.</div>`;
  const W=300,H=110,PL=38,PR=12,PT=14,PB=26,iW=W-PL-PR,iH=H-PT-PB;
  const vals=[...entries.map(e=>e.w),GOAL_W,START_W];
  const minV=Math.min(...vals)-1,maxV=Math.max(...vals)+1;
  const xS=i=>PL+(i/(entries.length-1||1))*iW;
  const yS=v=>PT+iH-((v-minV)/(maxV-minV))*iH;
  const lp=entries.map((e,i)=>`${i===0?"M":"L"}${xS(i).toFixed(1)},${yS(e.w).toFixed(1)}`).join(" ");
  const ap=`${lp} L${xS(entries.length-1).toFixed(1)},${PT+iH} L${xS(0).toFixed(1)},${PT+iH} Z`;
  const labels=new Set([0,entries.length-1]);for(let i=0;i<entries.length;i+=7)labels.add(i);
  const yLabels=[Math.round(minV+1),Math.round((minV+maxV)/2),Math.round(maxV-1)];
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7bd5"/><stop offset="100%" stop-color="#3a7bd500"/>
    </linearGradient></defs>
    <line x1="${PL}" x2="${PL+iW}" y1="${yS(START_W).toFixed(1)}" y2="${yS(START_W).toFixed(1)}" stroke="#ffffff25" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="${PL+2}" y="${(yS(START_W)-3).toFixed(1)}" font-size="9" fill="#ffffff44">Kezdő: ${START_W}</text>
    <line x1="${PL}" x2="${PL+iW}" y1="${yS(GOAL_W).toFixed(1)}" y2="${yS(GOAL_W).toFixed(1)}" stroke="#2ecc7166" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="${PL+2}" y="${(yS(GOAL_W)-3).toFixed(1)}" font-size="9" fill="#2ecc71aa">Cél: ${GOAL_W}</text>
    ${entries.length>1?`<path d="${ap}" fill="url(#wg)" opacity=".2"/><path d="${lp}" fill="none" stroke="#3a7bd5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:""}
    ${entries.map((e,i)=>`<circle cx="${xS(i).toFixed(1)}" cy="${yS(e.w).toFixed(1)}" r="3" fill="#3a7bd5" stroke="#0d0f14" stroke-width="1.5"/>`).join("")}
    ${yLabels.map(v=>`<text x="${PL-4}" y="${(yS(v)+4).toFixed(1)}" text-anchor="end" font-size="9" fill="#ffffff44">${v}</text>`).join("")}
    ${[...labels].filter(i=>i<entries.length).map(i=>`<text x="${xS(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="#ffffff44">${entries[i].d.slice(5)}</text>`).join("")}
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════
// MONTH BAR CHART

function monthBarsHTML(weeks){
  if(!weeks.length)return`<div style="text-align:center;color:#ffffff33;font-size:13px;padding:14px 0">Nincs adat ebben a hónapban.</div>`;
  const W=300,H=100,PL=28,PR=10,PT=10,PB=26,iW=W-PL-PR,iH=H-PT-PB,n=weeks.length,bW=Math.min(34,(iW/n)-4);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block">
    <line x1="${PL}" x2="${PL+iW}" y1="${PT+iH*.2}" y2="${PT+iH*.2}" stroke="#2ecc7155" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="${PL+2}" y="${PT+iH*.2-2}" font-size="8" fill="#2ecc7188">80% cél</text>
    ${weeks.map((w,i)=>{
      const x=PL+(i+.5)*(iW/n)-bW/2,bH=(w.pct/100)*iH,col=w.pct>=80?"#2ecc71":w.pct>=50?"#f39c12":"#e85d3a";
      const lbl=w.wid.replace(/\d{4}-W/,"")+"hét";
      return`<rect x="${x.toFixed(1)}" y="${(PT+iH-bH).toFixed(1)}" width="${bW}" height="${bH.toFixed(1)}" rx="3" fill="${col}" opacity=".85"/>
        <text x="${(x+bW/2).toFixed(1)}" y="${(PT+iH-bH-3).toFixed(1)}" text-anchor="middle" font-size="8" fill="${col}" font-weight="700">${w.pct}%</text>
        <text x="${(x+bW/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="7" fill="#ffffff44">${lbl}</text>`;
    }).join("")}
    ${[0,50,100].map(v=>`<text x="${PL-3}" y="${(PT+iH*(1-v/100)+4).toFixed(1)}" text-anchor="end" font-size="8" fill="#ffffff33">${v}</text>`).join("")}
  </svg>`;
}

function renderDayView(){

    </div>

  const edzBanner=day.edzés?`<div class="edzés-banner" style="background:#e85d3a15;border:1px solid #e85d3a33;color:#e85d3a">${day.edzés}</div>`:"";

  const filters=`<div class="filter-row">

      const a=filterCat===key;const c=CAT_CFG[key];
      const bc=a?(key==="all"?"#2ecc71":c?.border):"#ffffff15";

      const col=a?(key==="all"?"#2ecc71":c?.text):"#ffffff55";
      return`<button class="filter-btn ${a?"active":""}" onclick="setFilter('${key}')"

  const itemsHTML=items.map(item=>{

function renderMonthView(){

    return{wid,...calcWeekStats(merged)};
  });
  const mAvg=mWeeks.length?Math.round(mWeeks.reduce((s,w)=>s+w.pct,0)/mWeeks.length):0;
  const mByCat={};for(const c of Object.keys(CAT_CFG))mByCat[c]={total:0,done:0};
  for(const w of mWeeks)if(w.bycat)for(const c of Object.keys(CAT_CFG))if(w.bycat[c]){mByCat[c].total+=w.bycat[c].total;mByCat[c].done+=w.bycat[c].done;}
  const mCol=pctColor(mAvg);
  const catRows=Object.keys(CAT_CFG).map(c=>{const cv=mByCat[c];if(!cv||!cv.total)return"";
    const pct=Math.round(cv.done/cv.total*100);
    return`<div class="cat-row">
      <span class="cat-label" style="color:${CAT_CFG[c].text}">${CAT_CFG[c].label}</span>
      <div style="flex:1">${progBar(pct,CAT_CFG[c].border)}</div>
      <span class="cat-num">${pct}%</span>
    </div>`;}).join("");
  const weekDetail=mWeeks.map(w=>{const wc=pctColor(w.pct);
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:12px;color:#ffffff77;font-family:monospace">${w.wid}</span>
        <span style="font-size:13px;font-weight:700;color:${wc}">${w.pct}%</span>
      </div>${progBar(w.pct,wc)}</div>`;}).join("");
  return`
    <div class="month-nav">
      <button class="month-nav-btn" onclick="chMonth(-1)">◀</button>
      <span class="month-nav-label">${MONTH_HU[tM]} ${tY}</span>
      <button class="month-nav-btn" onclick="chMonth(1)">▶</button>
    </div>
    <div class="card stats-bar">${ringHTML(mAvg,80,mCol)}
      <div><div style="font-size:13px;color:#ffffff55;margin-bottom:4px">Havi átlag</div>
        <div style="font-size:22px;font-weight:800;color:${mCol}">${mAvg}%</div>
        <div style="font-size:12px;color:#ffffff44;margin-top:2px">${mWeeks.length} hét alapján</div></div>
    </div>
    <div class="card"><div class="card-title">Hetek teljesítése</div>${monthBarsHTML(mWeeks)}</div>
    <div class="card"><div class="card-title">Kategóriánként</div>${catRows}</div>
    <div class="card"><div class="card-title">Hetek részletesen</div>${weekDetail}</div>
    ${renderWeightSection()}`;
}

function renderBottomBar(){
  const {view,filterCat}=state;
  const label=filterCat!=="all"?` (${CAT_CFG[filterCat]?.label})`:"";
  return`<div class="bottom-bar">
    ${view==="today"?`<button class="act-btn" onclick="checkAll()" style="border:1px solid #2ecc7144;background:#2ecc7118;color:#2ecc71">✓ Mindet kész${label}</button>`:""}
    <button class="act-btn" onclick="reqNotif()" style="border:1px solid #9b59b644;background:#9b59b618;color:#9b59b6">🔔 Értesítés</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const {view,selDay,banner}=state;
  const day=WEEK_PLAN[selDay];
  let content="";
  if(view==="today"){
    content=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:15px;font-weight:700">${day?.label}</span>
    </div>${renderDayView()}`;
  } else if(view==="summary"){
    content=renderSummaryView();
  } else if(view==="month"){
    content=renderMonthView();
  } else if(view==="weight"){
    content=`<div style="font-size:15px;font-weight:700;margin-bottom:12px">⚖️ Súlynapló</div>${renderWeightSection()}`;
  }
  document.getElementById("app").innerHTML=
    renderHeader()+
    (view==="today"?renderDayRow():"")+
    `<div class="content">${banner?`<div class="banner">${banner}</div>`:""}${content}</div>`+
    renderBottomBar();
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS (global functions called from HTML)
// ═══════════════════════════════════════════════════════════════
function setView(v){setState({view:v});}
function selDay(d){setState({selDay:parseInt(d)});}
function goDay(d){setState({selDay:parseInt(d),view:"today"});}
function setFilter(f){setState({filterCat:f});}
function chMonth(dir){setState(s=>({monthOff:Math.min(s.monthOff+dir,0)}));}
function setWInput(v){setState({wInput:v});}

function toggleItem(id){
  setState(s=>{
    const ad=JSON.parse(JSON.stringify(s.allData));
    if(!ad[s.weekId])ad[s.weekId]={};
    if(!ad[s.weekId][s.selDay])ad[s.weekId][s.selDay]={};
    ad[s.weekId][s.selDay][id]=!ad[s.weekId][s.selDay][id];
    saveLS(TKEY,ad);
    return{allData:ad};
  });
}

function checkAll(){
  setState(s=>{
    const ad=JSON.parse(JSON.stringify(s.allData));
    if(!ad[s.weekId])ad[s.weekId]={};
    if(!ad[s.weekId][s.selDay])ad[s.weekId][s.selDay]={};
    const items=s.filterCat==="all"?WEEK_PLAN[s.selDay].items:WEEK_PLAN[s.selDay].items.filter(i=>i.cat===s.filterCat);
    for(const it of items)ad[s.weekId][s.selDay][it.id]=true;
    saveLS(TKEY,ad);
    return{allData:ad};
  });
}

function saveWeight(){
  const val=parseFloat(state.wInput.replace(",","."));
  if(isNaN(val)||val<50||val>150)return;
  setState(s=>{
    const wd={...s.weightData,[todayStr()]:val};
    saveLS(WKEY,wd);
    return{weightData:wd,wInput:"",wSaved:true};
  });
  setTimeout(()=>setState({wSaved:false}),2000);
}

function reqNotif(){
  if("Notification" in window){
    Notification.requestPermission().then(p=>{
      if(p==="granted"){
        setState({banner:"✅ Értesítések OK! Safari → Megosztás → Főképernyőre helyezés"});
        setTimeout(()=>setState({banner:null}),7000);
        new Notification("GN Tracker 💪",{body:"Értesítések aktívak!"});
      }
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
